<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Healing/Recovery - Green/Teal gradient -->
  <defs>
    <linearGradient id="bpc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0a0f1a"/>
  
  <!-- Molecular structure - healing theme -->
  <g opacity="0.15">
    <circle cx="100" cy="150" r="60" fill="url(#bpc-grad)"/>
    <circle cx="300" cy="150" r="60" fill="url(#bpc-grad)"/>
    <circle cx="200" cy="80" r="50" fill="url(#bpc-grad)"/>
    <circle cx="200" cy="220" r="50" fill="url(#bpc-grad)"/>
  </g>
  
  <!-- DNA helix style pattern -->
  <g filter="url(#glow)" opacity="0.8">
    <path d="M80 60 Q120 100 160 140 T240 220" stroke="url(#bpc-grad)" stroke-width="3" fill="none"/>
    <path d="M320 60 Q280 100 240 140 T160 220" stroke="url(#bpc-grad)" stroke-width="3" fill="none"/>
    
    <!-- Connection points (atoms) -->
    <circle cx="80" cy="60" r="6" fill="#10b981"/>
    <circle cx="160" cy="140" r="8" fill="#06b6d4"/>
    <circle cx="240" cy="220" r="6" fill="#10b981"/>
    <circle cx="320" cy="60" r="6" fill="#06b6d4"/>
    <circle cx="240" cy="140" r="8" fill="#10b981"/>
    <circle cx="160" cy="220" r="6" fill="#06b6d4"/>
  </g>
  
  <!-- Central molecule -->
  <g filter="url(#glow)">
    <circle cx="200" cy="150" r="40" fill="url(#bpc-grad)" opacity="0.3"/>
    <circle cx="200" cy="150" r="25" fill="url(#bpc-grad)" opacity="0.6"/>
    <text x="200" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">BPC</text>
  </g>
</svg>
