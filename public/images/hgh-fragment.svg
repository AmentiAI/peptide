<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="hgh-fragment-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-hgh-fragment">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="hgh-fragment-radial">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0a0f1a"/>
  
  <!-- Radial glow background -->
  <circle cx="200" cy="150" r="150" fill="url(#hgh-fragment-radial)"/>
  
  <!-- Molecular grid -->
  <g opacity="0.1" stroke="#8b5cf6" stroke-width="1">
    <line x1="0" y1="75" x2="400" y2="75"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="225" x2="400" y2="225"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
  </g>
  
  <!-- Molecular structure -->
  <g filter="url(#glow-hgh-fragment)" opacity="0.8">
    <!-- Central hexagon -->
    <path d="M200,110 L230,125 L230,155 L200,170 L170,155 L170,125 Z" 
          fill="none" stroke="url(#hgh-fragment-grad)" stroke-width="3"/>
    
    <!-- Orbital rings -->
    <circle cx="200" cy="150" r="60" fill="none" stroke="url(#hgh-fragment-grad)" stroke-width="2" opacity="0.6"/>
    <circle cx="200" cy="150" r="90" fill="none" stroke="url(#hgh-fragment-grad)" stroke-width="1" opacity="0.3"/>
    
    <!-- Atom nodes -->
    <circle cx="200" cy="110" r="6" fill="#8b5cf6"/>
    <circle cx="230" cy="125" r="5" fill="#7c3aed"/>
    <circle cx="230" cy="155" r="6" fill="#8b5cf6"/>
    <circle cx="200" cy="170" r="5" fill="#7c3aed"/>
    <circle cx="170" cy="155" r="6" fill="#8b5cf6"/>
    <circle cx="170" cy="125" r="5" fill="#7c3aed"/>
    
    <!-- Outer orbit atoms -->
    <circle cx="140" cy="150" r="4" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="260" cy="150" r="4" fill="#7c3aed" opacity="0.8"/>
    <circle cx="200" cy="60" r="4" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="200" cy="240" r="4" fill="#7c3aed" opacity="0.8"/>
  </g>
  
  <!-- Central label -->
  <g filter="url(#glow-hgh-fragment)">
    <circle cx="200" cy="150" r="35" fill="url(#hgh-fragment-grad)" opacity="0.3"/>
    <text x="200" y="155" text-anchor="middle" 
          font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
      HGH-F
    </text>
  </g>
  
  <!-- Theme label at bottom -->
  <text x="200" y="280" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6" opacity="0.7">
    Lipolysis
  </text>
</svg>